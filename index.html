<!doctype html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme Color (Android Chrome) -->
    <meta name="theme-color" content="#0EA5E9" />
    
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lok Kalyan" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <!-- SEO -->
    <title>Lok Kalyan | लोक कल्याण — Rural Healthcare Platform</title>
    <meta name="description" content="Lok Kalyan: Accessible rural healthcare — telemedicine, diagnostics, government schemes & community wellness for every village." />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Lok Kalyan SW registered:', reg.scope))
            .catch(err => console.warn('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
